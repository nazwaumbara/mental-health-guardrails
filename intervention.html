<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Breathe</title>
  <link rel="stylesheet" href="intervention.css">
</head>
<body>
  <div class="glass-container">
    <h1>You've been scrolling for a while.</h1>
    <p>Let's take a quick mental break before continuing.</p>
    
    <div class="cat-container">
      <img id="cat-image" src="" alt="A soothing cat" />
    </div>

    <div class="breathing-widget">
      <div id="breath-circle" class="circle"></div>
      <p id="breath-text">Get Ready...</p>
    </div>

    <div class="actions">
      <button id="btn-close" class="btn btn-disabled" disabled>Continue Scrolling (Wait 19s)</button>
      <button id="btn-break" class="btn btn-primary">Take a Break (Close Tab)</button>
    </div>
  </div>
  <script src="intervention.js"></script>
</body>
</html>
