<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guardrails Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { width: 450px; background-color: #f8fafc; }
  </style>
</head>
<body class="p-6 text-slate-800">
  
  <h1 class="text-2xl font-bold mb-4 text-slate-900">Mental Health Guardrails</h1>
  
  <div class="grid grid-cols-2 gap-4 mb-6">
    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
      <p class="text-xs text-slate-500 uppercase font-semibold">Triggers Prevented (7d)</p>
      <p id="kpi-triggers" class="text-3xl font-bold text-blue-600 mt-1">0</p>
    </div>
    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
      <p class="text-xs text-slate-500 uppercase font-semibold">Time Tracked (Today)</p>
      <p id="kpi-time" class="text-2xl font-bold text-emerald-600 mt-1">0 min</p>
    </div>
  </div>

  <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 mb-6">
    <h2 class="text-sm font-semibold mb-3">7-Day Overwhelm Trends</h2>
    <canvas id="trendChart" height="150"></canvas>
  </div>

  <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
    <h2 class="text-sm font-semibold mb-3">Intervention Thresholds</h2>
    <div class="flex gap-4">
      <div class="w-1/2">
        <label class="block text-xs text-slate-500 mb-1">Max Time (Mins)</label>
        <input id="input-time" type="number" class="w-full border rounded-lg p-2 text-sm focus:ring focus:ring-blue-200 outline-none">
      </div>
      <div class="w-1/2">
        <label class="block text-xs text-slate-500 mb-1">Max Scroll (Pixels)</label>
        <input id="input-scroll" type="number" step="1000" class="w-full border rounded-lg p-2 text-sm focus:ring focus:ring-blue-200 outline-none">
      </div>
    </div>
    <button id="btn-save" class="mt-3 w-full bg-slate-900 text-white rounded-lg py-2 text-sm font-semibold hover:bg-slate-800 transition">Save Settings</button>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
