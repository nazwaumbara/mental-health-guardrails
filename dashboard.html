<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mindful Guardrails</title>
  <script src="chart.js"></script>
  <style>
    body { width: 450px; background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 24px; color: #1e293b; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-top: 0; margin-bottom: 1rem; color: #0f172a; }
    h2 { font-size: 0.875rem; font-weight: 600; margin-top: 0; margin-bottom: 0.75rem; color: #334155; }
    
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .card { background-color: #ffffff; padding: 1rem; border-radius: 0.75rem; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; }
    .card.mb-6 { margin-bottom: 1.5rem; }
    
    .label { font-size: 0.75rem; color: #64748b; font-weight: 600; margin: 0; }
    .value-blue { font-size: 1.875rem; font-weight: 700; color: #2563eb; margin: 0.25rem 0 0 0; }
    .value-emerald { font-size: 1.5rem; font-weight: 700; color: #059669; margin: 0.25rem 0 0 0; }
    
    .chart-wrapper { position: relative; height: 180px; width: 100%; }
    .flex { display: flex; gap: 1rem; }
    .w-half { width: 50%; }
    
    label.input-label { display: block; font-size: 0.75rem; color: #475569; margin-bottom: 0.25rem; font-weight: 500; }
    input { width: 100%; box-sizing: border-box; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.5rem; font-size: 0.875rem; outline: none; transition: box-shadow 0.2s; }
    input:focus { box-shadow: 0 0 0 3px #bfdbfe; }
    
    button { width: 100%; margin-top: 0.75rem; background-color: #0f172a; color: #ffffff; border: none; border-radius: 0.5rem; padding: 0.5rem; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: background-color 0.2s; }
    button:hover { background-color: #1e293b; }
    .bg-emerald { background-color: #10b981 !important; }
  </style>
</head>
<body>
  
  <h1>Mindful Guardrails</h1>
  
  <div class="grid">
    <div class="card">
      <p class="label">Doomscrolling Prevented</p>
      <p id="kpi-triggers" class="value-blue">0</p>
    </div>
    <div class="card">
      <p class="label">Time on Socials (Today)</p>
      <p id="kpi-time" class="value-emerald">0 min</p>
    </div>
  </div>

  <div class="card mb-6">
    <h2>Your Mindful Breaks (Past 7 Days)</h2>
    <div class="chart-wrapper">
      <canvas id="trendChart"></canvas>
    </div>
  </div>

  <div class="card">
    <h2>When should we remind you to breathe?</h2>
    <div class="flex">
      <div class="w-half">
        <label class="input-label">Time Limit (Minutes)</label>
        <input id="input-time" type="number" min="1">
      </div>
      <div class="w-half">
        <label class="input-label">Scroll Limit (Screens)</label>
        <input id="input-scroll" type="number" min="5">
      </div>
    </div>
    <button id="btn-save">Save Preferences</button>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
